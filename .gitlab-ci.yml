stages:
  - build
  - mirror

variables:
  DOCKER_TLS_CERTDIR: ""

# ── 构建镜像并推送到 GitLab Container Registry ────────
#
# dev 分支 → :dev
# main 分支 → :main + :latest
# v* 标签   → :vX.Y.Z + :latest
#
build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_JOB_TOKEN" "$CI_REGISTRY"
  script:
    - docker build -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG"
    - |
      docker tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG" \
        "$CI_REGISTRY_IMAGE:sha-$CI_COMMIT_SHORT_SHA"
      docker push "$CI_REGISTRY_IMAGE:sha-$CI_COMMIT_SHORT_SHA"
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ] || echo "$CI_COMMIT_TAG" | grep -qE '^v'; then
        docker tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG" "$CI_REGISTRY_IMAGE:latest"
        docker push "$CI_REGISTRY_IMAGE:latest"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
      changes:
        - app/**
        - public/**
        - package.json
        - package-lock.json
        - next.config.ts
        - tsconfig.json
        - postcss.config.mjs
        - eslint.config.mjs
        - Dockerfile
        - .gitlab-ci.yml
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^v/

# ── 同步到 GitHub（仅 main 分支与 v* 标签） ───────────
#
# 使用前需要在 GitLab → Settings → CI/CD → Variables 中添加：
#   GITHUB_PAT           = github_pat_...  (fine-grained PAT: Contents R/W)
#   GITHUB_MIRROR_REPO   = github.com/lab-edu/web.git
#
# PAT 创建路径：GitHub → Settings → Developer settings → Fine-grained tokens
#   Resource owner: lab-edu
#   Repository:     Only select → web
#   Permissions:    Contents → Read and Write
#
mirror-to-github:
  stage: mirror
  image: alpine:latest
  before_script:
    - apk add --no-cache git
  script:
    - git remote add github "https://x-access-token:${GITHUB_PAT}@${GITHUB_MIRROR_REPO}"
    - git push github HEAD:main --tags
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^v/
