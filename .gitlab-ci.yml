stages:
  - lint
  - build
  - mirror

# ── dev 分支：代码风格检查 ─────────────────────────────
lint:
  stage: lint
  image: node:22-alpine
  before_script:
    - npm ci
  script:
    - npm run lint
    - npx tsc --noEmit
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
      changes:
        - app/**
        - lib/**
        - components/**
        - public/**
        - "*.ts"
        - "*.tsx"
        - "*.json"
        - "*.mjs"
        - .gitlab-ci.yml

# ── 构建镜像并推送到 GitLab Container Registry ────────
#
# main 分支 → :main + :latest + :sha-xxx
# v* 标签   → :vX.Y.Z + :latest + :sha-xxx
#
build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  before_script:
    - mkdir -p /kaniko/.docker
    - |
      echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_JOB_TOKEN\"}}}" \
        > /kaniko/.docker/config.json
  script:
    - |
      /kaniko/executor \
        --context "$CI_PROJECT_DIR" \
        --dockerfile "$CI_PROJECT_DIR/Dockerfile" \
        --cache=true \
        --cache-repo="$CI_REGISTRY_IMAGE/cache" \
        --destination "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG" \
        --destination "$CI_REGISTRY_IMAGE:sha-$CI_COMMIT_SHORT_SHA"
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ] || echo "$CI_COMMIT_TAG" | grep -qE '^v'; then
        /kaniko/executor \
          --context "$CI_PROJECT_DIR" \
          --dockerfile "$CI_PROJECT_DIR/Dockerfile" \
          --cache=true \
          --cache-repo="$CI_REGISTRY_IMAGE/cache" \
          --destination "$CI_REGISTRY_IMAGE:latest"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^v/

# ── 同步到 GitHub（仅 main 分支与 v* 标签） ───────────
mirror-to-github:
  stage: mirror
  image: alpine:latest
  before_script:
    - apk add --no-cache git
  script:
    - git remote add github "https://x-access-token:${GITHUB_PAT}@${GITHUB_MIRROR_REPO}"
    - git push github HEAD:main --tags
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^v/
